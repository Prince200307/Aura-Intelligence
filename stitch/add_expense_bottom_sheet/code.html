<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aura — Add Expense</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container": "#efeeeb",
                    "primary": "#3525cd",
                    "inverse-on-surface": "#f2f1ee",
                    "on-background": "#1b1c1a",
                    "secondary-container": "#b6b4ff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#e9e8e5",
                    "background": "#faf9f6",
                    "on-primary-container": "#dad7ff",
                    "outline": "#777587",
                    "surface-dim": "#dbdad7",
                    "inverse-surface": "#2f312f",
                    "on-error": "#ffffff",
                    "outline-variant": "#c7c4d8",
                    "surface-bright": "#faf9f6",
                    "on-tertiary-fixed-variant": "#7b2f00",
                    "on-primary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#e2dfff",
                    "primary-fixed-dim": "#c3c0ff",
                    "surface-container-highest": "#e3e2df",
                    "inverse-primary": "#c3c0ff",
                    "surface": "#faf9f6",
                    "on-surface-variant": "#464555",
                    "tertiary-fixed": "#ffdbcc",
                    "primary-fixed": "#e2dfff",
                    "on-secondary-container": "#454386",
                    "primary-container": "#4f46e5",
                    "error": "#ba1a1a",
                    "surface-variant": "#e3e2df",
                    "tertiary": "#7e3000",
                    "surface-container-low": "#f4f3f0",
                    "surface-tint": "#4d44e3",
                    "on-surface": "#1b1c1a",
                    "on-secondary-fixed": "#140f54",
                    "on-primary-fixed": "#0f0069",
                    "on-primary-fixed-variant": "#3323cc",
                    "secondary": "#58579b",
                    "error-container": "#ffdad6",
                    "tertiary-container": "#a44100",
                    "on-tertiary-fixed": "#351000",
                    "secondary-fixed-dim": "#c3c0ff",
                    "tertiary-fixed-dim": "#ffb695",
                    "on-secondary-fixed-variant": "#413f82",
                    "on-tertiary-container": "#ffd2be",
                    "on-error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .tonal-lift {
        background: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,1) 100%);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
      }
      /* Hide arrows for number inputs */
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface">
<!-- Mobile Screen Container -->
<div class="relative min-h-screen w-full max-w-[430px] mx-auto bg-surface overflow-hidden shadow-2xl">
<!-- Background/Underlay View (Simulated Dashboard Context) -->
<div class="p-6 space-y-6 opacity-40 select-none pointer-events-none">
<header class="flex justify-between items-center">
<div class="w-10 h-10 rounded-full bg-surface-container-high"></div>
<div class="w-8 h-8 rounded-lg bg-surface-container-high"></div>
</header>
<div class="h-48 w-full bg-surface-container-low rounded-3xl"></div>
<div class="space-y-4">
<div class="h-16 w-full bg-surface-container-low rounded-2xl"></div>
<div class="h-16 w-full bg-surface-container-low rounded-2xl"></div>
</div>
</div>
<!-- Dimming Overlay -->
<div class="absolute inset-0 bg-on-surface/10 backdrop-blur-[2px] z-10"></div>
<!-- Full-Screen Bottom Sheet -->
<div class="absolute inset-x-0 bottom-0 top-[10%] bg-surface-bright z-20 rounded-t-[32px] shadow-[0_-12px_40px_rgba(27,28,26,0.12)] flex flex-col overflow-hidden">
<!-- Drag Handle & Header -->
<div class="w-full flex flex-col items-center pt-3 pb-4">
<div class="w-12 h-1 bg-surface-dim rounded-full mb-6"></div>
<h1 class="font-headline font-bold text-xl tracking-tight text-on-surface">Log Expense</h1>
</div>
<!-- Content Area -->
<div class="flex-1 overflow-y-auto px-6 pb-8 space-y-8">
<!-- Amount Input Section (Hero Data) -->
<div class="flex flex-col items-center justify-center py-6">
<span class="font-label text-[10px] uppercase tracking-widest font-bold text-outline mb-2">Transaction Amount</span>
<div class="flex items-baseline gap-2">
<span class="font-headline text-3xl font-bold text-primary">₹</span>
<input class="w-full max-w-[200px] text-center font-headline text-6xl font-extrabold bg-transparent border-none focus:ring-0 placeholder:text-surface-dim text-on-surface" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Main Form Body -->
<div class="space-y-6">
<!-- Expense Name Field -->
<div class="relative">
<input class="peer block w-full px-5 pt-7 pb-3 text-on-surface bg-surface-container-low border-none rounded-2xl focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all" id="expense_name" placeholder=" " type="text"/>
<label class="absolute text-sm font-medium text-outline duration-300 transform -translate-y-4 scale-75 top-5 z-10 origin-[0] left-5 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-4 peer-focus:text-primary" for="expense_name">Expense name (e.g. Monthly Rent)</label>
</div>
<!-- Type Segmented Control -->
<div class="space-y-3">
<span class="font-label text-[10px] uppercase tracking-widest font-bold text-outline px-1">Allocation Priority</span>
<div class="grid grid-cols-2 p-1 bg-surface-container-low rounded-2xl h-14 items-center">
<button class="h-full flex items-center justify-center font-bold text-xs tracking-wide bg-primary text-on-primary rounded-xl shadow-lg transition-all active:scale-95">
                                NEED
                            </button>
<button class="h-full flex items-center justify-center font-bold text-xs tracking-wide text-on-surface-variant hover:text-on-surface transition-all">
                                WANT
                            </button>
</div>
</div>
<!-- Category Dropdown -->
<div class="space-y-3">
<span class="font-label text-[10px] uppercase tracking-widest font-bold text-outline px-1">Category</span>
<button class="w-full flex items-center justify-between px-5 py-4 bg-surface-container-low rounded-2xl hover:bg-surface-container-high transition-all group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-tertiary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-container text-xl" data-icon="house">house</span>
</div>
<div class="flex flex-col items-start">
<span class="text-sm font-semibold text-on-surface">Home &amp; Living</span>
<span class="text-[11px] text-outline">Essential utilities &amp; maintenance</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="expand_more">expand_more</span>
</button>
<!-- Mini Intelligence Chip -->
<div class="flex items-center gap-2 p-3 bg-secondary-container/20 rounded-xl border border-secondary-container/30">
<span class="material-symbols-outlined text-primary text-sm" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="text-[11px] font-medium text-on-secondary-container">Aura suggests this as a Fixed Cost.</span>
</div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="px-6 pb-12 pt-4 bg-surface-bright">
<div class="flex flex-col gap-3">
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container rounded-2xl flex items-center justify-center gap-2 text-on-primary font-bold shadow-[0_8px_24px_rgba(53,37,205,0.25)] active:scale-95 transition-all">
<span class="material-symbols-outlined text-xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        Log Expense
                    </button>
<button class="w-full h-14 bg-transparent text-outline font-semibold text-sm hover:text-on-surface transition-colors active:opacity-60">
                        Cancel
                    </button>
</div>
</div>
</div>
<!-- System Navigation Bar Bottom (Mobile Anchor) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-safe h-[64px] bg-[#faf9f6]/90 backdrop-blur-md z-50 rounded-t-2xl shadow-[0_-4px_20px_rgba(27,28,26,0.04)] pointer-events-none opacity-50">
<div class="flex flex-col items-center justify-center text-stone-400">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-bold">Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-bold">Expenses</span>
</div>
<div class="flex flex-col items-center justify-center text-[#3525cd] scale-110">
<span class="material-symbols-outlined" data-icon="ads_click">ads_click</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-bold">Goals</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-bold">Insights</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-bold">History</span>
</div>
</nav>
</div>
</body></html>
