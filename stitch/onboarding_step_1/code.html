        body { font-family: 'Inter', sans-serif; background-color: #faf9f6; color: #1b1c1a; -webkit-font-smoothing: antialiased; }

<body class="bg-background min-h-screen flex flex-col items-center justify-center p-6 sm:p-12 relative overflow-hidden">
<!-- Decorative Background Aura Elements -->
<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[40%] h-[40%] bg-tertiary/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Header Actions -->
<header class="fixed top-0 left-0 w-full p-8 flex justify-between items-center z-20">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary font-bold text-2xl" data-icon="auto_awesome">auto_awesome</span>
<span class="headline-font font-extrabold tracking-tighter text-xl text-primary">Aura</span>
</div>
<button class="text-on-surface-variant font-label text-[12px] uppercase tracking-widest font-bold hover:text-primary transition-colors">
            Skip
        </button>
</header>
<!-- Main Content Container -->
<main class="w-full max-w-2xl z-10 flex flex-col items-center">
<!-- Step Indicator Top -->
<div class="mb-8 flex flex-col items-center gap-2">
<span class="text-tertiary font-label text-[10px] uppercase tracking-[0.2em] font-bold">Concept One</span>
<h1 class="headline-font text-4xl sm:text-5xl font-extrabold text-on-surface text-center tracking-tight leading-[1.1]">
                Understand your money <br/>in <span class="text-primary">3 buckets</span>
</h1>
</div>
<!-- Asymmetric Bucket Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full mb-12 mt-4">
<!-- Needs Bucket -->
<div class="tonal-lift aura-glow p-8 rounded-3xl flex flex-col items-start gap-4 transition-all duration-500 hover:scale-[1.02] border border-white/20">
<div class="w-12 h-12 bg-primary/10 rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="home_work">home_work</span>
</div>
<div>
<h3 class="headline-font font-bold text-xl text-on-surface mb-1">Needs</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">
                        Non-negotiable essentials — rent, groceries, bills
                    </p>
</div>
</div>
<!-- Wants Bucket -->
<div class="tonal-lift aura-glow p-8 rounded-3xl flex flex-col items-start gap-4 transition-all duration-500 hover:scale-[1.02] border border-white/20">
<div class="w-12 h-12 bg-secondary-container/20 rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-3xl" data-icon="shopping_bag">shopping_bag</span>
</div>
<div>
<h3 class="headline-font font-bold text-xl text-on-surface mb-1">Wants</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">
                        Discretionary spending — dining, subscriptions, shopping
                    </p>
</div>
</div>
<!-- Goals Bucket -->
<div class="tonal-lift aura-glow p-8 rounded-3xl flex flex-col items-start gap-4 transition-all duration-500 hover:scale-[1.02] border border-white/20">
<div class="w-12 h-12 bg-tertiary-fixed/40 rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary text-3xl" data-icon="stars">stars</span>
</div>
<div>
<h3 class="headline-font font-bold text-xl text-on-surface mb-1">Goals</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">
                        Big-ticket items you're saving toward — <span class="font-bold text-on-surface">₹5,000 and above</span>
</p>
</div>
</div>
</div>
<!-- CTA Section -->
<div class="flex flex-col items-center gap-8 w-full max-w-xs">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-5 px-8 rounded-2xl font-bold text-lg aura-glow hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                Got it, let's start
                <span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- Footer Progress Indicator -->
<footer class="fixed bottom-12 w-full flex flex-col items-center gap-4">
<div class="flex gap-3">
<div class="w-2.5 h-2.5 rounded-full bg-primary aura-glow scale-125 transition-all"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-dim transition-all"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-dim transition-all"></div>
</div>
<span class="text-on-surface-variant/40 font-label text-[10px] uppercase tracking-widest font-bold">Step 1 of 3</span>
