<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aura — Onboarding</title>
<!-- Material Symbols for Iconography -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#efeeeb",
                        "primary": "#3525cd",
                        "inverse-on-surface": "#f2f1ee",
                        "on-background": "#1b1c1a",

                        "surface-container-high": "#e9e8e5",
                        "background": "#faf9f6",

                        "surface-bright": "#faf9f6",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#e2dfff",
                        "primary-fixed-dim": "#c3c0ff",
                        "surface-container-highest": "#e3e2df",
                        "inverse-primary": "#c3c0ff",
                        "surface": "#faf9f6",
                        "on-surface-variant": "#464555",
                        "tertiary-fixed": "#ffdbcc",
                        "primary-fixed": "#e2dfff",
                        "on-secondary-container": "#454386",
                        "primary-container": "#4f46e5",
                        "error": "#ba1a1a",
                        "surface-variant": "#e3e2df",
                        "tertiary": "#7e3000",
                        "surface-container-low": "#f4f3f0",
                        "surface-tint": "#4d44e3",
                        "on-surface": "#1b1c1a",
                        "on-secondary-fixed": "#140f54",
                        "on-primary-fixed": "#0f0069",
                        "on-primary-fixed-variant": "#3323cc",
                        "secondary": "#58579b",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#a44100",
                        "on-tertiary-fixed": "#351000",
                        "secondary-fixed-dim": "#c3c0ff",
                        "tertiary-fixed-dim": "#ffb695",
                        "on-secondary-fixed-variant": "#413f82",
                        "on-tertiary-container": "#ffd2be",
                        "on-error-container": "#93000a"

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]

                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
        }
        .tonal-lift {
            box-shadow: 0px 4px 20px rgba(27, 28, 26, 0.04), 0px 12px 40px rgba(27, 28, 26, 0.06);
        }
        input:focus {
            outline: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-secondary-container/30">
<!-- Main Content Canvas -->
<main class="min-h-screen flex flex-col items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Atmospheric Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-tertiary/5 blur-[120px] rounded-full"></div>
<!-- Back Navigation -->
<nav class="absolute top-8 left-8">
<a class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-[20px]">arrow_back</span>
<span class="font-label text-[12px] uppercase tracking-widest font-bold">Back</span>
</a>
</nav>
<!-- Onboarding Shell -->
<div class="w-full max-w-xl flex flex-col items-center text-center">
<!-- Step Counter & Month Label -->
<div class="mb-8 space-y-2">
<span class="font-label text-[12px] uppercase tracking-[0.2em] text-primary font-bold">Step 2 of 3</span>
<div class="flex items-center justify-center gap-2 py-2 px-4 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-[18px] text-tertiary">calendar_today</span>
<span class="font-headline font-semibold text-on-surface tracking-tight">April 2026</span>
</div>
</div>
<!-- Headline -->
<h1 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tight text-on-surface mb-12">
                What's your budget <br/>this month?
            </h1>
<!-- Input Section -->
<div class="w-full mb-16">
<div class="relative group">
<!-- Invisible Placeholder/Visual Anchor -->
<div class="flex items-center justify-center text-6xl md:text-8xl font-headline font-extrabold tracking-tighter transition-all duration-500">
<span class="text-on-surface-variant/20 mr-2">₹</span>
<input autofocus="" class="bg-transparent border-none text-center focus:ring-0 w-[240px] md:w-[400px] p-0 placeholder:text-on-surface-variant/10 text-on-surface" placeholder="0" type="text"/>
</div>
<!-- Underline Decoration (Tonal) -->
<div class="h-[1px] w-32 mx-auto mt-4 bg-outline-variant/30 group-focus-within:w-64 group-focus-within:bg-primary transition-all duration-700"></div>
</div>
<p class="mt-6 text-on-surface-variant font-medium text-sm">
                    You can change this any time
                </p>
</div>
<!-- CTA -->
<button class="group relative px-10 py-5 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-[12px] font-headline font-bold text-lg tonal-lift hover:scale-[1.02] active:scale-95 transition-all duration-300">
<span class="flex items-center gap-3">
                    Set Income
                    <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</span>
</button>
<!-- Aura Intelligence Chip -->
<div class="mt-16 bg-secondary-container/10 border border-secondary-container/20 rounded-xl px-6 py-4 flex items-center gap-4 max-w-sm">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" data-weight="fill">auto_awesome</span>
</div>
<p class="text-left text-[13px] leading-relaxed text-on-surface-variant">
<strong class="text-primary">Aura Tip:</strong> Setting a realistic budget helps our AI predict your savings potential more accurately.
                </p>
</div>
</div>
<!-- Fixed Progress Dots Footer -->
<footer class="absolute bottom-12 flex flex-col items-center gap-6">
<div class="flex gap-3">
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-8 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
</footer>
</main>
<!-- Contextual Decorative Visual (Editorial Feel) -->
<div class="hidden lg:block fixed right-[-5%] top-[20%] opacity-20 pointer-events-none">
<div class="w-96 h-96 rounded-[48px] overflow-hidden rotate-12 bg-surface-container-low border border-outline-variant/20 tonal-lift">
<img alt="minimal aesthetic" class="w-full h-full object-cover" data-alt="abstract architectural shot of clean white curves and shadows with a minimalist editorial feel and soft lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBQuU30iJAayuB0BCURA6EIEm-0tUpKIcXPM-9RxFixxYSn_04jJW37tTHqMmwBZLYqPKMzGwVJ-XvSRoRJLuUtsaKm9rMHQboDFfKwZQbY9dO5X4OoxRGnCLLxzPdcOE0ruP37xlYox1C7GImZiNM4cS063Mze0R_j2TkOB6VHNncBCZmEFKbsYCGp3oNOGBebhW4V5LGNeEY--5o1o9dVFRRHh_jAaCUz8IAoGa9z4WJUlWgyW8fi3AFWlRb_yovZ1ekY9C9dj_Q"/>
</div>
</div>
</body></html>
